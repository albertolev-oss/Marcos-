<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Visor modelo local</title><style>html,body{margin:0;height:100%;background:#050b16;color:white;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;overflow:hidden}#bar{position:fixed;top:12px;left:12px;right:12px;z-index:10;background:rgba(10,18,33,.88);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:12px;backdrop-filter:blur(12px)}h1{font-size:19px;margin:0 0 6px}.small{color:#b9c7d8;font-size:13px;line-height:1.35}.row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}button,label.btn{background:#2563eb;color:white;border:0;border-radius:13px;padding:11px 13px;font-weight:800;font-size:14px}button{background:#334155}.warn{color:#fde68a;margin-top:8px;font-size:12px}.ok{color:#bbf7d0}canvas{display:block;width:100%;height:100%}</style><script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script></head><body><div id="bar"><h1>Visor privado de modelo óseo</h1><div class="small">No abras el archivo OBJ directo: GitHub lo muestra como código. Primero descargalo, después tocá <b>Cargar OBJ/STL</b>.</div><div class="row"><label class="btn">Cargar OBJ/STL<input id="file" type="file" accept=".obj,.stl" hidden></label><button id="ap">AP</button><button id="lat">Lateral</button><button id="ax">Axial</button><button id="reset">Reset</button></div><div id="status" class="warn">Modelo no cargado.</div></div><canvas id="c"></canvas><script type="module">import * as THREE from 'three';import{OrbitControls}from'tree/addons/controls/OrbitControls.js'.replace('tree/','three/');import{OBJLoader}from'three/addons/loaders/OBJLoader.js';import{STLLoader}from'three/addons/loaders/STLLoader.js';const c=document.getElementById('c'),s=document.getElementById('status');const scene=new THREE.Scene();scene.background=new THREE.Color(0x050b16);const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.01,100);camera.position.set(2.6,1.4,4);const r=new THREE.WebGLRenderer({canvas:c,antialias:true});r.setSize(innerWidth,innerHeight);r.setPixelRatio(Math.min(devicePixelRatio,2));scene.add(new THREE.HemisphereLight(0xffffff,0x102033,2.4));const l=new THREE.DirectionalLight(0xffffff,2.2);l.position.set(3,5,3);scene.add(l);const o=new OrbitControls(camera,r.domElement);o.target.set(0,0,0);o.enableDamping=true;scene.add(new THREE.GridHelper(4,24,0x36506d,0x17243a));const mat=new THREE.MeshStandardMaterial({color:0xe9d6b2,roughness:.82,metalness:.02});let model=new THREE.Group();scene.add(model);function norm(obj){obj.traverse(x=>{if(x.isMesh){x.material=mat;x.geometry.computeVertexNormals()}});const b=new THREE.Box3().setFromObject(obj),sz=new THREE.Vector3(),ct=new THREE.Vector3();b.getSize(sz);b.getCenter(ct);obj.position.sub(ct);obj.scale.multiplyScalar(3/(Math.max(sz.x,sz.y,sz.z)||1));return obj}function load(f){const ext=f.name.split('.').pop().toLowerCase(),url=URL.createObjectURL(f);s.textContent='Cargando…';const ok=obj=>{scene.remove(model);model=norm(obj);scene.add(model);s.textContent='Cargado: '+f.name;s.className='ok';URL.revokeObjectURL(url)};const bad=e=>{console.error(e);s.textContent='No pude cargar el archivo.';URL.revokeObjectURL(url)};if(ext==='obj')new OBJLoader().load(url,ok,undefined,bad);else if(ext==='stl')new STLLoader().load(url,g=>ok(new THREE.Mesh(g,mat)),undefined,bad);else s.textContent='Usá OBJ o STL.'}document.getElementById('file').onchange=e=>load(e.target.files[0]);function view(p){camera.position.set(...p);o.target.set(0,0,0);o.update()}document.getElementById('ap').onclick=()=>view([0,0,4]);document.getElementById('lat').onclick=()=>view([4,0,0]);document.getElementById('ax').onclick=()=>view([0,4,.01]);document.getElementById('reset').onclick=()=>view([2.6,1.4,4]);addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();r.setSize(innerWidth,innerHeight)});function a(){requestAnimationFrame(a);o.update();r.render(scene,camera)}a();</script></body></html>
