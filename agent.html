<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Agente ATR</title><style>:root{--bg:#03101e;--card:rgba(5,18,35,.94);--line:rgba(255,255,255,.14);--txt:#f8fafc;--mut:#9fb0c7;--blue:#1687ff;--green:#16a34a;--orange:#ea580c;--gray:#334155}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#0b3264 0,#03101e 42%,#020817 100%);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.app{max-width:980px;margin:auto;padding:12px 12px 28px}.top{display:flex;align-items:center;gap:10px;margin-bottom:10px}.top h1{margin:0;font-size:28px}.top span{color:var(--blue)}.top p{margin:2px 0 0;color:var(--mut)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 18px 55px rgba(0,0,0,.35)}.viewer{height:44vh;min-height:300px;overflow:hidden;padding:0}.viewer iframe{width:100%;height:100%;border:0}.chat{height:44vh;min-height:300px;overflow:auto;background:#020817;border:1px solid var(--line);border-radius:18px;padding:12px}.msg{padding:10px 12px;border-radius:14px;margin:0 0 10px;white-space:pre-wrap;line-height:1.35}.bot{background:rgba(22,135,255,.14);border:1px solid rgba(22,135,255,.34)}.user{background:rgba(22,163,74,.14);border:1px solid rgba(22,163,74,.34);margin-left:18px}.input{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:10px}input,textarea{width:100%;border:1px solid var(--line);border-radius:15px;background:#050b18;color:white;padding:13px;font-size:15px}button{border:0;border-radius:15px;background:var(--gray);color:white;font-weight:900;padding:12px 13px}.blue{background:var(--blue)}.green{background:var(--green)}.orange{background:var(--orange)}.cmds{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.status{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}.tile{background:#020817;border:1px solid var(--line);border-radius:14px;padding:10px}.tile b{font-size:20px;display:block}.tile small{color:var(--mut)}.steps{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:10px}.step{height:36px;border-radius:999px;display:grid;place-items:center;background:#0b172b;border:1px solid #34465f;font-weight:900;cursor:pointer}.step.active{background:linear-gradient(180deg,#1687ff,#0b4f9c);box-shadow:0 0 18px rgba(22,135,255,.55)}pre{white-space:pre-wrap;background:#020817;border:1px solid var(--line);border-radius:14px;padding:12px;color:#dbeafe}.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:rgba(0,0,0,.82);border:1px solid var(--line);padding:9px 14px;border-radius:999px;display:none}@media(max-width:760px){.grid{grid-template-columns:1fr}.viewer{height:34vh;min-height:260px}.chat{height:36vh}.cmds{grid-template-columns:1fr 1fr}.status{grid-template-columns:1fr 1fr}}</style></head><body><div class="app"><div class="top"><div><h1>Agente <span>ATR</span></h1><p>Agente local: entiende comandos y controla la app educativa.</p></div></div><div class="grid"><section class="card viewer"><iframe title="Modelo 3D" allow="autoplay; fullscreen; xr-spatial-tracking" allowfullscreen src="https://sketchfab.com/models/42cc722795e1474eb4866dc4d3d74e90/embed?autostart=1&ui_theme=dark&dnt=1&ui_infos=0&ui_watermark=0&ui_help=0"></iframe></section><section class="card"><h2>Chat del agente</h2><div class="status"><div class="tile"><b id="stStep">1/8</b><small>Paso</small></div><div class="tile"><b id="stLive">OFF</b><small>Live</small></div><div class="tile"><b id="stNav">OFF</b><small>Nav</small></div><div class="tile"><b id="stTime">00:00</b><small>Tiempo</small></div></div><div class="chat" id="chat"></div><div class="input"><input id="prompt" placeholder="Ej: ir al paso 4 y activar live" onkeydown="if(event.key==='Enter')send()"><button class="blue" onclick="send()">Enviar</button></div></section></div><section class="card" style="margin-top:12px"><h2 id="title">Paso 1</h2><p id="desc" style="color:#dbe7f5"></p><div class="steps" id="steps"></div><div class="cmds"><button class="green" onclick="agent('activar live')">Live</button><button class="blue" onclick="agent('siguiente')">Siguiente</button><button class="blue" onclick="agent('anterior')">Anterior</button><button class="orange" onclick="agent('generar plan')">Plan</button><button onclick="agent('activar navegacion')">Nav</button><button onclick="agent('abrir checklist')">Checklist</button><button onclick="location.href='atr.html'">ATR App</button><button onclick="location.href='python.html'">Python</button></div><div id="panel"></div></section></div><div class="toast" id="toast"></div><script>const $=id=>document.getElementById(id),chat=$('chat'),toast=$('toast');const pasos=['Paso 1: introducción y preparación educativa','Paso 2: exposición anatómica educativa','Paso 3: referencias articulares','Paso 4: preparación femoral conceptual','Paso 5: preparación tibial conceptual','Paso 6: prueba de componentes','Paso 7: implante conceptual','Paso 8: resumen final'];let state={step:0,live:false,nav:false,seconds:0,timer:null,notes:[]};function msg(t){toast.textContent=t;toast.style.display='block';clearTimeout(msg.t);msg.t=setTimeout(()=>toast.style.display='none',1400)}function add(c,t){let d=document.createElement('div');d.className='msg '+c;d.textContent=t;chat.appendChild(d);chat.scrollTop=chat.scrollHeight}function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}function render(){$('stStep').textContent=(state.step+1)+'/8';$('stLive').textContent=state.live?'ON':'OFF';$('stNav').textContent=state.nav?'ON':'OFF';$('stTime').textContent=fmt(state.seconds);$('title').textContent=pasos[state.step];$('desc').textContent='Módulo educativo controlado por agente local. Podés pedir: siguiente, anterior, paso 4, live, navegación, checklist, generar plan.';document.querySelectorAll('.step').forEach((e,i)=>e.classList.toggle('active',i===state.step));localStorage.setItem('agentATRState',JSON.stringify({...state,timer:null}))}function build(){let s=$('steps');s.innerHTML='';pasos.forEach((p,i)=>{let b=document.createElement('div');b.className='step';b.textContent=i+1;b.onclick=()=>{state.step=i;render();add('bot','Voy al paso '+(i+1))};s.appendChild(b)})}function live(on){if(on===state.live)return;state.live=on;if(on){state.timer=setInterval(()=>{state.seconds++;if(state.seconds%12===0)next();render()},1000)}else{clearInterval(state.timer);state.timer=null}render()}function next(){state.step=Math.min(7,state.step+1);render()}function prev(){state.step=Math.max(0,state.step-1);render()}function setStep(n){state.step=Math.max(0,Math.min(7,n-1));render()}function plan(){return ['PLAN EDUCATIVO - AGENTE ATR','Fecha: '+new Date().toLocaleString(),'Paso: '+pasos[state.step],'Live: '+(state.live?'ON':'OFF'),'Navegación: '+(state.nav?'ON':'OFF'),'Tiempo: '+fmt(state.seconds),'Notas: '+(state.notes.join('; ')||'sin notas'),'Aviso: uso educativo, no clínico.'].join('\n')}function openPanel(kind){if(kind==='plan'){$('panel').innerHTML='<h3>Plan generado</h3><pre>'+plan()+'</pre><button onclick="copyPlan()">Copiar plan</button>'}else if(kind==='check'){$('panel').innerHTML='<h3>Checklist</h3><label><input type="checkbox"> Revisar objetivo educativo</label><br><label><input type="checkbox"> Revisar alineación conceptual</label><br><label><input type="checkbox"> Documentar observaciones</label><br><label><input type="checkbox"> Exportar plan</label>'}else if(kind==='nav'){$('panel').innerHTML='<h3>Navegación conceptual</h3><p>Trackers simulados: femoral OK · tibial OK</p><p>Desvío eje simulado: '+(state.step-3)+'°</p><p>Esto es educativo, no mide al paciente.</p>'}}window.copyPlan=async()=>{try{await navigator.clipboard.writeText(plan());msg('Plan copiado')}catch{msg('No pude copiar')}}function send(){let p=$('prompt').value.trim();if(!p)return;$('prompt').value='';agent(p)}function agent(text){add('user',text);let t=text.toLowerCase(),out=[];let m=t.match(/paso\s*(\d)/);if(m){setStep(Number(m[1]));out.push('Listo: paso '+(state.step+1));}if(t.includes('siguiente')){next();out.push('Avancé al paso '+(state.step+1));}if(t.includes('anterior')){prev();out.push('Volví al paso '+(state.step+1));}if(t.includes('live')||t.includes('vivo')){live(!state.live);out.push('Live '+(state.live?'activado':'pausado'));}if(t.includes('present')){live(true);out.push('Modo presentación iniciado.');}if(t.includes('pausa')||t.includes('stop')||t.includes('detener')){live(false);out.push('Pausado.');}if(t.includes('nav')||t.includes('naveg')){state.nav=!state.nav;openPanel('nav');render();out.push('Navegación '+(state.nav?'activada':'desactivada'));}if(t.includes('check')){openPanel('check');out.push('Abrí checklist.');}if(t.includes('plan')||t.includes('resumen')){openPanel('plan');out.push('Generé un plan educativo.');}if(t.includes('python')){out.push('Abro Python.');setTimeout(()=>location.href='python.html',500)}if(t.includes('atr app')){out.push('Abro ATR App.');setTimeout(()=>location.href='atr.html',500)}if(t.includes('nota')){state.notes.push(text);out.push('Agregué una nota.');}if(out.length===0)out.push('No entendí todo. Probá: siguiente, paso 4, activar live, navegación, checklist, generar plan, abrir Python.');add('bot',out.join('\n'));render()}window.agent=agent;window.send=send;build();render();add('bot','Hola Marcos. Soy el agente local. Escribí: “ir al paso 4”, “activar live”, “generar plan”, “abrir navegación” o “abrir Python”.');</script></body></html>
